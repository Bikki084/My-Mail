# BulkFirePro — gzip JSON/text responses at the nginx edge.
# Installed as /etc/nginx/conf.d/bulkfirepro-compression.conf
#
# Skips types that are already compressed (images, pdf, zip, video, etc.).
# Pair with proxy_set_header Accept-Encoding "" on the upstream block so
# Node/Next does not pre-compress (avoids double compression).

# NOTE: Do NOT set `gzip on;` here — Ubuntu's /etc/nginx/nginx.conf already
# enables gzip. A second `gzip on;` makes `nginx -t` fail and blocks reloads.
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_disable "msie6";
gzip_types
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/ld+json
    text/css
    text/javascript
    text/plain
    text/xml
    image/svg+xml;
